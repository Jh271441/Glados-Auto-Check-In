name: GlaDOS Auto Check-in

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:       # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许 push keepalive commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check-in
        id: checkin
        run: |
          response=$(curl -s -X POST "https://glados.cloud/api/user/checkin" \
            -H "Content-Type: application/json;charset=UTF-8" \
            -H "Cookie: ${{ secrets.GLADOS_COOKIE }}" \
            -H "Referer: https://glados.cloud/console/checkin" \
            -H "Origin: https://glados.cloud" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36")
          echo "签到原始响应: $response"
          # 提取 message 字段作为摘要
          msg=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','未知'))" 2>/dev/null || echo "解析失败")
          echo "checkin_msg=$msg" >> $GITHUB_OUTPUT

      - name: Get Status
        id: status
        run: |
          status=$(curl -s "https://glados.cloud/api/user/status" \
            -H "Cookie: ${{ secrets.GLADOS_COOKIE }}" \
            -H "Referer: https://glados.cloud/console/checkin" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36")
          echo "状态原始响应: $status"
          days=$(echo "$status" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          left = d.get('data', {}).get('leftDays', None)
          print(round(float(left), 1) if left is not None else '未知')
          " 2>/dev/null || echo "未知")
          echo "left_days=$days" >> $GITHUB_OUTPUT

      - name: Push to WeChat via PushPlus
        if: always()
        run: |
          checkin_msg="${{ steps.checkin.outputs.checkin_msg }}"
          days="${{ steps.status.outputs.left_days }}"
          now=$(date -u '+%Y-%m-%d %H:%M UTC')

          content="<h3>🚀 GlaDOS 每日签到报告</h3>
          <hr/>
          <p>🕐 <b>执行时间：</b>${now}</p>
          <p>✅ <b>签到结果：</b>${checkin_msg}</p>
          <p>📅 <b>剩余天数：</b>${days} 天</p>
          <hr/>
          <p><small>由 GitHub Actions 自动执行</small></p>"

          push_resp=$(curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{
              \"token\": \"${{ secrets.PUSH_TOKEN }}\",
              \"title\": \"GlaDOS 签到 - ${checkin_msg}\",
              \"content\": \"${content}\",
              \"template\": \"html\"
            }")
          echo "推送结果: $push_resp"

      - name: Keep Alive (每周一提交一次)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "$(date +%u)" = "1" ]; then
            echo "Last keepalive: $(date -u '+%Y-%m-%d %H:%M UTC')" > .keepalive
            git add .keepalive
            git diff --cached --quiet || git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')"
            git push
          else
            echo "今天不是周一，跳过 keepalive commit"
          fi
